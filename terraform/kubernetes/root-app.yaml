apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: media-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/coeditor600/homelab-public.git"
    targetRevision: HEAD
    path: kubernetes/media-stack
  destination:
    server: "https://kubernetes.default.svc"
    namespace: media-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
